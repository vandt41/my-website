<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Feeder Control</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <a href="index.html">🏠 home</a>

    <div>
        <h3>🐾 Pet Feeder Control</h3>

        <button id="connect">1. Connect to Feeder</button>
        <br><br>
        <button id="feed" disabled>2. Feed Now</button>
        <button id="camera" disabled>3. Open Camera</button>


        <div class="info-box">
            <p><strong>Status:</strong> <span id="status">Disconnected</span></p>
            <p><strong>Feeder:</strong> <span id="feederStatus">Offline</span></p>
            <p><strong>Last Fed:</strong> <span id="lastFed">Never</span></p>
            <p><strong>Food Level:</strong> <span id="foodLevel">Unknown</span></p>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
        let client = null;
        let lastFedTime = null;

        const statusEl = document.getElementById('status');
        const feederStatusEl = document.getElementById('feederStatus');
        const lastFedEl = document.getElementById('lastFed');
        const foodLevelEl = document.getElementById('foodLevel');

        const connectBtn = document.getElementById('connect');
        const feedBtn = document.getElementById('feed');
        const cameraBtn = document.getElementById('camera');

        function updateLastFed() {
            if (!lastFedTime) return;
            const minutesAgo = Math.floor((Date.now() - lastFedTime) / 60000);
            lastFedEl.textContent = minutesAgo < 1 ? "Just now" : `${minutesAgo} minute${minutesAgo > 1 ? 's' : ''} ago`;
        }

        // Connect button
        connectBtn.onclick = function () {
            if (client) client.end();

            client = mqtt.connect('ws://127.0.0.1:9001', {
                username: "petfeeder",
                password: "123",
                reconnectPeriod: 3000
            });

            client.on('connect', () => {
                statusEl.textContent = "Status: Connected ✅";
                statusEl.style.color = "green";
                feedBtn.disabled = false;
                cameraBtn.disabled = false;
                connectBtn.disabled = true;

                client.subscribe('petfeeder/status/#', { qos: 1 });
            });

            client.on('message', (topic, message) => {
                const msg = message.toString();
                console.log(`[${topic}] ${msg}`);

                if (topic === "petfeeder/status" || topic === "petfeeder/status/feeder") {
                    feederStatusEl.textContent = msg;

                    if (msg.toLowerCase().includes("dispensed") || msg.toLowerCase().includes("feed")) {
                        lastFedTime = Date.now();
                        updateLastFed();
                    }
                }

                if (topic === "petfeeder/status/food") {
                    foodLevelEl.textContent = msg;
                }
            });

            client.on('error', (err) => {
                console.error(err);
                statusEl.textContent = "Status: Connection Error ❌";
                statusEl.style.color = "red";
            });
        };

        // Feed button
        feedBtn.onclick = () => {
            if (client && client.connected) {
                const payload = {
                    action: "feed",
                    amount: 1,
                    timestamp: Date.now()
                };
                client.publish('petfeeder/commands', JSON.stringify(payload), { qos: 1 });
            }
        };

        // Camera button
        cameraBtn.onclick = () => {
            if (client && client.connected) {
                const payload = {
                    action: "camera_on",
                    duration: 30
                };
                client.publish('petfeeder/commands', JSON.stringify(payload), { qos: 1 });
            }
        };

        // Auto update "Last Fed" every 30 seconds
        setInterval(updateLastFed, 30000);
    </script>
</body>

</html>
